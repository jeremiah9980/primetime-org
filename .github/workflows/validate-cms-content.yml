name: Validate Primetime CMS content

on:
  pull_request:
    paths:
      - "cms/content/**"
      - "cms/schema/**"
  push:
    branches: ["main"]
    paths:
      - "cms/content/**"
      - "cms/schema/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate content JSON
        run: node scripts/validate-primetime-content.mjs
